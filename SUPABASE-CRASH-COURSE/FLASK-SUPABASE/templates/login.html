<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h1>Iniciar Sesión</h1>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Correo"
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Productos</title>
</head>
<body>

    <h1>Lista de productos</h1>

    {% if session.user %}
        <p>Bienvenido {{ session.user }}</p>
        <a href="/logout">Cerrar sesión</a>
    {% else %}
        <a href="/login">Login</a>
    {% endif %}

    <hr>

    {% for producto in productos %}
        <h3>{{ producto.nombre }}</h3>
        <p>${{ producto.precio }}</p>
    {% endfor %}

</body>
</html>

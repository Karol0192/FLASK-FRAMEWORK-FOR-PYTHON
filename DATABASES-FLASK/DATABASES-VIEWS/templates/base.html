<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Adopción{% endblock %}</title>

    <link rel="stylesheet" href="{{url_for('static',filename='css/master.css')}}">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
            color: #111;
        }

        /* Navbar ultra limpia */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #eee;
        }

        .nav-brand {
            font-weight: 600;
            font-size: 18px;
            text-decoration: none;
            color: #111;
        }

        .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            color: #000;
        }

        .nav-links .danger {
            color: #999;
        }

        .nav-links .danger:hover {
            color: #e63946;
        }

        /* Contenido */
        main {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Footer */
        footer {
            text-align: center;
            margin: 60px 0 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="nav">
        <a class="nav-brand" href="{{ url_for('index') }}">
            🐶 Adopta
        </a>

        <div class="nav-links">
            <a href="{{ url_for('index') }}">Inicio</a>
            <a href="{{ url_for('list_pup') }}">Perros</a>
            <a href="{{ url_for('add_pup') }}">Agregar</a>
            <a href="{{ url_for('del_pup') }}" class="danger">Eliminar</a>
        </div>
    </nav>

    <!-- Contenido -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        © 2026 — Adopción de cachorros
    </footer>

</body>
</html>

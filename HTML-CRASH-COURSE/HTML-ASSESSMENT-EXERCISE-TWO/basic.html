<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Puppy Adoption Page</h1>
    <h3>Please enter your information to adopt a puppy and we´ll you back</h3>

    <p>Please Note:First Name,Last Name,Password and Email are required</p>
    <form action="" method="get">
        <label for="firstnametag">First Name:</label>
        <input type="text" name="firstnametag" placeholder="First Name">

        <label for="lastnametag">Last Name:</label>
        <input type="text" name="lastnametag" placeholder="Last Name">
        <br>
        <br>
        <label for="emaitag">Email:</label>
        <input type="email" name="emaitag" placeholder="Email">

        <label for="passtag">Password:</label>
        <input type="password" name="passtag">

        <p>Are you ever the age of 18?</p>
        <label for="choice_option">Yes</label>
        <input type="radio" name="choice_option" value="yes">

        <label for="choice_option">No</label>
        <input type="radio" name="choice_option" value="No">

        <p>Do you have a Credit Card or Paypal?</p>
        <select name="pay_method" >
            <option value="credit_card">Credit Card</option>
            <option value="paypal">PayPal</option>
        </select>

        <br>
        <br>

        <input type="submit" value="Submit Feedback">

    </form>
</body>
</html>
